events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Docker internal DNS resolver
  resolver 127.0.0.11 valid=10s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Security Headers ────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com blob:; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://images.unsplash.com https://*.unsplash.com https://server.arcgisonline.com https://*.basemaps.cartocdn.com; media-src 'self' blob:; connect-src 'self' ws: wss: https://accounts.google.com https://nominatim.openstreetmap.org https://demotiles.maplibre.org https://server.arcgisonline.com https://*.basemaps.cartocdn.com; frame-src 'self' https://accounts.google.com; frame-ancestors 'none';" always;

    location = /api {
      return 301 /api/;
    }

    location /api/ {
      set $api_upstream http://api:3000;
      rewrite ^/api/(.*) /$1 break;
      proxy_pass $api_upstream;
    }

    location = /analytics {
      return 301 /analytics/;
    }

    location /analytics/ {
      set $analytics_upstream http://analytics:8000;
      rewrite ^/analytics/(.*) /$1 break;
      proxy_pass $analytics_upstream;
    }

    location = /tiles {
      return 301 /tiles/;
    }

    location /tiles/ {
      set $tiles_upstream http://tileserver:8080;
      rewrite ^/tiles/(.*) /$1 break;
      proxy_pass $tiles_upstream;
    }

    location / {
      set $web_upstream http://web:5173;
      proxy_pass $web_upstream;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
